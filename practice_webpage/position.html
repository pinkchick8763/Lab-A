<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <link rel="stylesheet" href="./css/position.css">
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="square-head-1">1</div>
      <div class="square-head-2">2</div>
      <div class="square-head-3">3</div>
      <div class="square-head-4">4</div>
    </div>
    <div class="content">
      <div class="left">
        <div class="square-left-1">1</div>
        <div class="square-left-2">2</div>
        <div class="square-left-3">3</div>
        <div class="square-left-4">4</div>
      </div>
      <div class="center">
        <div class="square-center-1">1</div>
        <div class="square-center-2">2</div>
        <div class="square-center-3">3</div>
        <div class="square-center-4">4</div>
      </div>
      <div class="right">
        <h2>解說區：</h2>
        <p>看看左邊的四個彩色方塊，經過絕對定位與相對定位的設定以後，他們彼此還可以重疊喔</p>
      </div>
    </div>
    <div class="clearfix"></div>
    <div class="footer">
      <h2>解說區：</h2>
      <p>只要在要定位的元素加上position:absolute還有(top,left,right,bottom)及對應的值，並且在他的父元素加上position:relative，那個元素就可在在它的父元素範圍內任意定位喔</p>
    </div>
  </div> 
</body>
</html>
